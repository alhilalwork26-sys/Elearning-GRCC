<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0;}body{overflow:hidden;background:#0B2447;}</style>
</head><body>
<iframe src="index.html" style="width:100vw;height:100vh;border:none;" onload="
  var v=this.contentDocument.getElementById('video');
  if(v){
    this.contentDocument.querySelectorAll('.fade-up').forEach(function(e){e.classList.add('visible');});
    this.contentWindow.scrollTo(0, v.offsetTop - 70);
  }
"></iframe>
</body></html>
