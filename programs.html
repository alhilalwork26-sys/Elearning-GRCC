<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Aktif — GRCC Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/d-sidebar.css">
  <style>

    /* ── Stats strip ── */
    .prog-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .prog-stat-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow .2s;
    }
    .prog-stat-card:hover { box-shadow: var(--sh); }
    .prog-stat-icon {
      width: 44px; height: 44px;
      border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
    }
    .prog-stat-icon.teal  { background: rgba(20,184,166,.1);  }
    .prog-stat-icon.navy  { background: rgba(11,36,71,.08);   }
    .prog-stat-icon.gold  { background: rgba(212,160,23,.1);  }
    .prog-stat-icon.green { background: rgba(34,197,94,.1);   }
    .prog-stat-val { font-family:var(--font-h); font-size:1.625rem; font-weight:900; color:var(--navy); line-height:1; }
    .prog-stat-lbl { font-size:.775rem; color:var(--text-xs); margin-top:3px; font-weight:500; }

    /* ── Section header ── */
    .section-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
    }
    .section-title { font-family:var(--font-h); font-size:1.0625rem; font-weight:800; color:var(--navy); }

    /* View toggle */
    .view-toggle { display:flex; gap:4px; background:var(--bg); border-radius:var(--r); padding:3px; }
    .view-btn {
      width:32px; height:32px; border-radius:calc(var(--r) - 1px);
      display:flex; align-items:center; justify-content:center;
      border:none; cursor:pointer; background:none; color:var(--text-xs);
      transition:all .15s;
    }
    .view-btn.active { background:var(--white); color:var(--navy); box-shadow:0 1px 4px rgba(0,0,0,.1); }

    /* ── Grid view ── */
    .prog-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }

    .prog-card-v2 {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: all .2s;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .prog-card-v2:hover { box-shadow: 0 8px 32px rgba(0,0,0,.1); transform: translateY(-2px); border-color: rgba(20,184,166,.4); }

    .prog-card-v2-accent {
      height: 4px;
      background: var(--teal);
    }
    .prog-card-v2-accent.done   { background: var(--success); }
    .prog-card-v2-accent.pre    { background: var(--warning); }
    .prog-card-v2-accent.new    { background: var(--teal); }

    .prog-card-v2-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }

    .prog-card-v2-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:14px; }
    .prog-card-v2-icon {
      width:46px; height:46px; border-radius:var(--r);
      display:flex; align-items:center; justify-content:center;
      font-size:1.375rem; flex-shrink:0;
      background: rgba(20,184,166,.08);
    }
    .prog-card-v2-meta { flex:1; min-width:0; }
    .prog-card-v2-code { font-size:.68rem; font-weight:700; letter-spacing:.08em; color:var(--text-xs); text-transform:uppercase; margin-bottom:3px; }
    .prog-card-v2-title { font-weight:800; font-size:.9375rem; color:var(--navy); line-height:1.3; }

    .prog-card-v2-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }

    .prog-card-v2-progress { margin-bottom:16px; }
    .prog-card-v2-prog-hd { display:flex; justify-content:space-between; font-size:.78rem; margin-bottom:6px; }
    .prog-card-v2-prog-lbl { color:var(--text-xs); }
    .prog-card-v2-prog-pct { font-weight:700; color:var(--navy); }
    .prog-bar-wrap { height:7px; background:var(--border); border-radius:99px; overflow:hidden; }
    .prog-bar-fill { height:100%; border-radius:99px; transition:width .6s cubic-bezier(.4,0,.2,1); background:var(--teal); }
    .prog-bar-fill.done { background:var(--success); }
    .prog-bar-fill.pre  { background:var(--warning); }

    .prog-card-v2-info {
      display:grid; grid-template-columns:1fr 1fr;
      gap:8px; margin-bottom:16px;
      padding:12px; background:var(--bg); border-radius:var(--r);
    }
    .prog-info-item { display:flex; align-items:center; gap:6px; font-size:.78rem; color:var(--text-sm); }
    .prog-info-item svg { color:var(--text-xs); flex-shrink:0; }

    .prog-card-v2-footer {
      margin-top: auto;
      display:flex; gap:8px;
    }
    .btn-lanjut {
      flex:1; padding:10px 12px; border-radius:var(--r-md);
      font-size:.875rem; font-weight:700; cursor:pointer; border:none;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .2s; text-decoration:none;
    }
    .btn-lanjut.primary { background:var(--teal); color:white; box-shadow:0 2px 8px rgba(20,184,166,.3); }
    .btn-lanjut.primary:hover { background:var(--teal-dk); box-shadow:0 4px 14px rgba(20,184,166,.4); }
    .btn-lanjut.success { background:var(--success); color:white; box-shadow:0 2px 8px rgba(34,197,94,.3); }
    .btn-lanjut.success:hover { background:#16a34a; }
    .btn-lanjut.warning { background:var(--warning); color:var(--navy); }
    .btn-lanjut.warning:hover { filter:brightness(.93); }
    .btn-lanjut.outline { background:var(--bg); color:var(--text-sm); border:1.5px solid var(--border); flex:0 0 auto; padding:10px 12px; }
    .btn-lanjut.outline:hover { border-color:var(--teal); color:var(--teal); }

    /* ── List view ── */
    .prog-list { display:flex; flex-direction:column; gap:12px; }

    .prog-list-item {
      background:var(--white);
      border:1.5px solid var(--border);
      border-radius:var(--r-lg);
      padding:18px 20px;
      display:flex; align-items:center; gap:16px;
      transition:all .2s;
      cursor:pointer;
      text-decoration:none;
    }
    .prog-list-item:hover { box-shadow:var(--sh); border-color:rgba(20,184,166,.4); }
    .prog-list-icon { width:48px; height:48px; border-radius:var(--r); display:flex; align-items:center; justify-content:center; font-size:1.375rem; flex-shrink:0; background:rgba(20,184,166,.08); }
    .prog-list-main { flex:1; min-width:0; }
    .prog-list-code { font-size:.68rem; font-weight:700; letter-spacing:.08em; color:var(--text-xs); text-transform:uppercase; }
    .prog-list-title { font-weight:700; font-size:.9375rem; color:var(--navy); margin:2px 0 6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prog-list-badges { display:flex; gap:5px; }
    .prog-list-bar { width:160px; flex-shrink:0; }
    .prog-list-bar-hd { display:flex; justify-content:space-between; font-size:.75rem; margin-bottom:5px; }
    .prog-list-bar-lbl { color:var(--text-xs); }
    .prog-list-bar-pct { font-weight:700; color:var(--navy); }
    .prog-list-action { flex-shrink:0; }

    /* ── Empty state ── */
    .empty-wrap {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .empty-card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .empty-illustration {
      width: 200px;
      height: 200px;
      margin: 0 auto 32px;
      position: relative;
    }
    /* SVG illustration background circles */
    .empty-circle-outer {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(20,184,166,.06) 0%, rgba(11,36,71,.04) 100%);
      border: 2px dashed rgba(20,184,166,.2);
      display: flex; align-items: center; justify-content: center;
      animation: emptyPulse 3s ease-in-out infinite;
    }
    .empty-circle-inner {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(20,184,166,.1) 0%, rgba(11,36,71,.06) 100%);
      border: 1.5px solid rgba(20,184,166,.25);
      display: flex; align-items: center; justify-content: center;
    }
    .empty-icon-wrap {
      width: 88px; height: 88px;
      background: linear-gradient(135deg, var(--teal) 0%, #0d9488 100%);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(20,184,166,.35);
      font-size: 2.25rem;
    }
    @keyframes emptyPulse {
      0%, 100% { transform: scale(1); opacity:1; }
      50%       { transform: scale(1.04); opacity:.85; }
    }

    /* Floating dots decoration */
    .empty-dot {
      position: absolute;
      border-radius: 50%;
      background: var(--teal);
      opacity: .18;
      animation: floatDot 4s ease-in-out infinite;
    }
    @keyframes floatDot {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .empty-title {
      font-family: var(--font-h);
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 10px;
    }
    .empty-desc {
      font-size: .9375rem;
      color: var(--text-sm);
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .empty-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .empty-step {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 16px 12px;
      transition: all .2s;
    }
    .empty-step:hover { border-color:var(--teal); box-shadow:var(--sh); }
    .empty-step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--teal);
      color: white;
      font-size: .8125rem;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
    }
    .empty-step-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .empty-step-label { font-size: .78rem; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
    .empty-step-desc { font-size: .72rem; color: var(--text-xs); line-height: 1.4; }
    .empty-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .btn-enroll-big {
      padding: 13px 28px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: var(--r-md);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: all .2s;
      box-shadow: 0 4px 16px rgba(20,184,166,.35);
    }
    .btn-enroll-big:hover { background:var(--teal-dk); transform:translateY(-1px); box-shadow:0 6px 24px rgba(20,184,166,.45); }
    .btn-browse {
      padding: 13px 24px;
      background: var(--white);
      color: var(--navy);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: all .2s;
    }
    .btn-browse:hover { border-color:var(--navy); }

    /* Filter tabs */
    .filter-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .filter-tab {
      padding:6px 14px; border-radius:99px; font-size:.8125rem; font-weight:600;
      color:var(--text-sm); background:var(--bg); border:1.5px solid var(--border);
      cursor:pointer; transition:all .2s;
    }
    .filter-tab.active { background:var(--navy); color:white; border-color:var(--navy); }
    .filter-tab:hover:not(.active) { border-color:var(--teal); color:var(--teal); }

    @media (max-width:900px) {
      .prog-stats { grid-template-columns:repeat(2,1fr); }
      .prog-grid  { grid-template-columns:1fr; }
      .empty-steps { grid-template-columns:1fr; }
      .prog-list-bar { display:none; }
    }
  </style>
</head>

<script>
const { CAT_BADGE, LEVEL_BADGE, getEnrolled, moduleHref } = window.GRCCAcademy;

/* ─────────────────────────────────────────
   Auth & Sidebar
───────────────────────────────────────── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

(function initAuth() {
  const name = localStorage.getItem('grcc_name') || 'Ahmad Fauzi, S.E.';
  const role = localStorage.getItem('grcc_role') || 'peserta';
  const labels = { peserta:'Peserta Aktif', admin:'Administrator', instruktur:'Instruktur' };
  const dashMap = { peserta:'dashboard.html', admin:'admin.html', instruktur:'instruktur.html' };
  const initials = name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();

  const nameEl   = document.getElementById('dSidebarName');
  const roleEl   = document.getElementById('dSidebarRole');
  const avatarEl = document.getElementById('dSidebarAvatar');
  if (nameEl)   nameEl.textContent   = name;
  if (roleEl)   roleEl.textContent   = labels[role] || 'Peserta Aktif';
  if (avatarEl) avatarEl.textContent = initials || 'AF';

  const ta = document.getElementById('topbarAvatar'); if (ta) ta.textContent = initials;
  const tn = document.getElementById('topbarName');   if (tn) tn.textContent = name.split(' ')[0];

  const dashLink = document.getElementById('dashLink');
  if (dashLink) dashLink.href = dashMap[role] || 'dashboard.html';

  document.getElementById('logoutLink').addEventListener('click', e => {
    e.preventDefault();
    localStorage.removeItem('grcc_role');
    localStorage.removeItem('grcc_name');
    localStorage.removeItem('grcc_email');
    localStorage.removeItem('grcc_user_key');
    window.location.href = 'login.html';
  });
})();

/* ─────────────────────────────────────────
   State
───────────────────────────────────────── */
let viewMode = 'grid'; // 'grid' | 'list'
let activeFilter = 'all';

/* ─────────────────────────────────────────
   Main render
───────────────────────────────────────── */
function render() {
  const enrolled = getEnrolled();
  const main = document.getElementById('mainContent');
  if (enrolled.length === 0) {
    renderEmpty(main);
  } else {
    renderPrograms(main, enrolled);
  }
}

/* ─────────────────────────────────────────
   Empty state
───────────────────────────────────────── */
function renderEmpty(container) {
  document.getElementById('pageTitle').textContent = 'Program Aktif';
  container.innerHTML = `
    <div class="empty-wrap">
      <div class="empty-card">

        <!-- Illustration -->
        <div class="empty-illustration">
          <div class="empty-dot" style="width:10px;height:10px;top:10px;left:30px;animation-delay:.5s;"></div>
          <div class="empty-dot" style="width:7px;height:7px;top:20px;right:25px;animation-delay:1.2s;"></div>
          <div class="empty-dot" style="width:13px;height:13px;bottom:15px;left:20px;animation-delay:.8s;"></div>
          <div class="empty-dot" style="width:8px;height:8px;bottom:25px;right:35px;animation-delay:1.8s;"></div>
          <div class="empty-circle-outer">
            <div class="empty-circle-inner">
              <div class="empty-icon-wrap">📚</div>
            </div>
          </div>
        </div>

        <h2 class="empty-title">Belum Ada Program yang Diikuti</h2>
        <p class="empty-desc">
          Mulai perjalanan belajar GRC Anda sekarang. Enroll program dengan kode akses
          dari instruktur atau jelajahi 12+ program tersedia.
        </p>

        <!-- Steps -->
        <div class="empty-steps">
          <div class="empty-step">
            <div class="empty-step-icon">🔑</div>
            <div class="empty-step-label">Dapatkan Kode</div>
            <div class="empty-step-desc">Terima kode program dari instruktur atau instansi Anda</div>
          </div>
          <div class="empty-step">
            <div class="empty-step-icon">🎯</div>
            <div class="empty-step-label">Enroll Program</div>
            <div class="empty-step-desc">Masukkan kode di halaman Enroll Program untuk aktivasi</div>
          </div>
          <div class="empty-step">
            <div class="empty-step-icon">🚀</div>
            <div class="empty-step-label">Mulai Belajar</div>
            <div class="empty-step-desc">Akses materi, selesaikan modul, dan raih sertifikat</div>
          </div>
        </div>

        <!-- CTA -->
        <div class="empty-actions">
          <a href="enroll.html" class="btn-enroll-big">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Enroll Program Sekarang
          </a>
          <a href="enroll.html" class="btn-browse">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Jelajahi Program
          </a>
        </div>

        <!-- Sample programs teaser -->
        <div style="margin-top:36px;text-align:left;">
          <div style="font-size:.75rem;font-weight:700;color:var(--text-xs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;text-align:center;">Program Populer yang Bisa Anda Ikuti</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${[
              { code:'ERM-2026',  icon:'⚖️', title:'Enterprise Risk Management (ERM) — Fundamental', cat:'Risk Management', badgeCls:'badge-gold' },
              { code:'GCG-BASIC', icon:'🏛️', title:'Tata Kelola Perusahaan yang Baik (GCG)',           cat:'Governance',      badgeCls:'badge-info' },
              { code:'AML-2026',  icon:'🔍', title:'Anti-Money Laundering & KYC Praktis',              cat:'Compliance',      badgeCls:'badge-teal' },
            ].map(p => `
              <a href="enroll.html?code=${p.code}" style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-md);text-decoration:none;transition:all .2s;" onmouseover="this.style.borderColor='var(--teal)'" onmouseout="this.style.borderColor='var(--border)'">
                <div style="width:36px;height:36px;border-radius:var(--r);background:rgba(20,184,166,.08);display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0;">${p.icon}</div>
                <div style="flex:1;min-width:0;">
                  <div style="font-weight:700;font-size:.875rem;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.title}</div>
                  <span class="badge ${p.badgeCls}" style="margin-top:3px;">${p.cat}</span>
                </div>
                <div style="font-size:.75rem;font-weight:700;color:var(--text-xs);letter-spacing:.06em;flex-shrink:0;">${p.code}</div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="color:var(--text-xs);flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
              </a>
            `).join('')}
          </div>
        </div>

      </div>
    </div>
  `;
}

/* ─────────────────────────────────────────
   Programs list
───────────────────────────────────────── */
function renderPrograms(container, enrolled) {
  const total    = enrolled.length;
  const ongoing  = enrolled.filter(p => p.status === 'active' && p.progress < 100).length;
  const done     = enrolled.filter(p => p.certificateIssued || p.finalPassed || p.status === 'done').length;
  const pretest  = enrolled.filter(p => p.status === 'pre-test').length;

  container.innerHTML = `
    <!-- Stats -->
    <div class="prog-stats">
      <div class="prog-stat-card">
        <div class="prog-stat-icon teal">📚</div>
        <div>
          <div class="prog-stat-val" id="stat-total">${total}</div>
          <div class="prog-stat-lbl">Total Program</div>
        </div>
      </div>
      <div class="prog-stat-card">
        <div class="prog-stat-icon navy">▶️</div>
        <div>
          <div class="prog-stat-val" id="stat-ongoing">${ongoing}</div>
          <div class="prog-stat-lbl">Sedang Berjalan</div>
        </div>
      </div>
      <div class="prog-stat-card">
        <div class="prog-stat-icon gold">📝</div>
        <div>
          <div class="prog-stat-val" id="stat-pretest">${pretest}</div>
          <div class="prog-stat-lbl">Perlu Pre-Test</div>
        </div>
      </div>
      <div class="prog-stat-card">
        <div class="prog-stat-icon green">🏆</div>
        <div>
          <div class="prog-stat-val" id="stat-done">${done}</div>
          <div class="prog-stat-lbl">Selesai / Lulus</div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div style="background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px;">
      <div class="section-hd">
        <div class="section-title">Daftar Program Saya</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <!-- Filter -->
          <div class="filter-tabs" id="filterTabs">
            <div class="filter-tab active" onclick="setFilter('all',this)">Semua</div>
            <div class="filter-tab" onclick="setFilter('active',this)">Berlangsung</div>
            <div class="filter-tab" onclick="setFilter('pre-test',this)">Pre-Test</div>
            <div class="filter-tab" onclick="setFilter('done',this)">Selesai</div>
          </div>
          <!-- View toggle -->
          <div class="view-toggle">
            <button class="view-btn ${viewMode==='grid'?'active':''}" onclick="setView('grid')" title="Grid">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </button>
            <button class="view-btn ${viewMode==='list'?'active':''}" onclick="setView('list')" title="List">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div id="cardsContainer"></div>
    </div>
  `;

  renderCards(enrolled);
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderCards(getEnrolled());
}

function setView(v) {
  viewMode = v;
  document.querySelectorAll('.view-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && v==='grid') || (i===1 && v==='list')));
  renderCards(getEnrolled());
}

function renderCards(enrolled) {
  const container = document.getElementById('cardsContainer');
  if (!container) return;

  let filtered = enrolled;
  if (activeFilter === 'active')   filtered = enrolled.filter(p => p.status === 'active' && p.progress < 100);
  if (activeFilter === 'pre-test') filtered = enrolled.filter(p => p.status === 'pre-test');
  if (activeFilter === 'done')     filtered = enrolled.filter(p => p.status === 'done' || p.progress >= 100);

  if (filtered.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-xs);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40" style="opacity:.2;margin-bottom:10px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p style="font-size:.875rem;">Tidak ada program dengan status ini.</p>
    </div>`;
    return;
  }

  if (viewMode === 'list') {
    container.innerHTML = `<div class="prog-list">${filtered.map(p => buildListItem(p)).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="prog-grid">${filtered.map(p => buildCard(p)).join('')}</div>`;
  }
}

/* ─────────────────────────────────────────
   Card builder
───────────────────────────────────────── */
function buildCard(p) {
  const isCertified = p.certificateIssued || p.finalPassed || p.status === 'done';
  const needsQuiz = p.progress >= 100 && !p.quizPassed;
  const needsFinal = p.progress >= 100 && p.quizPassed && !p.finalPassed;
  const isDone   = isCertified;
  const isPre    = p.status === 'pre-test';
  const pct      = p.progress || 0;
  const mod      = isDone ? 'Selesai' : needsQuiz ? 'Materi selesai' : needsFinal ? 'Siap Final Exam' : `Modul ${p.currentModule||1} dari ${p.modules}`;
  const date     = p.enrolledAt ? new Date(p.enrolledAt).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}) : '-';
  const accentCls = isDone ? 'done' : (isPre ? 'pre' : 'new');
  const barCls    = isDone ? 'done' : (isPre ? 'pre' : '');

  let actionBtn;
  if (isDone) {
    actionBtn = `<a href="certificate.html?code=${p.code}" class="btn-lanjut success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      Unduh Sertifikat
    </a>`;
  } else if (needsQuiz) {
    actionBtn = `<a href="quiz.html?code=${p.code}" class="btn-lanjut warning">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Kerjakan Quiz
    </a>`;
  } else if (needsFinal) {
    actionBtn = `<a href="exam.html?code=${p.code}&type=final" class="btn-lanjut warning">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Final Exam
    </a>`;
  } else if (isPre) {
    actionBtn = `<a href="exam.html?code=${p.code}&type=pretest" class="btn-lanjut warning">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Mulai Pre-Test
    </a>`;
  } else {
    actionBtn = `<a href="${moduleHref(p)}" class="btn-lanjut primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Lanjutkan
    </a>`;
  }

  const statusBadge = isDone
    ? `<span class="badge badge-success">✓ Lulus</span>`
    : needsQuiz
      ? `<span class="badge badge-warning">Perlu Quiz</span>`
      : needsFinal
        ? `<span class="badge badge-warning">Perlu Final</span>`
    : isPre
      ? `<span class="badge badge-warning">Pre-Test Wajib</span>`
      : `<span class="badge badge-success">Sedang Berjalan</span>`;

  return `
  <div class="prog-card-v2">
    <div class="prog-card-v2-accent ${accentCls}"></div>
    <div class="prog-card-v2-body">
      <div class="prog-card-v2-top">
        <div class="prog-card-v2-icon">${p.icon || '📘'}</div>
        <div class="prog-card-v2-meta">
          <div class="prog-card-v2-code">${p.code}</div>
          <div class="prog-card-v2-title">${p.title}</div>
        </div>
      </div>
      <div class="prog-card-v2-badges">
        ${CAT_BADGE[p.category] || ''}
        ${statusBadge}
      </div>

      <!-- Progress -->
      <div class="prog-card-v2-progress">
        <div class="prog-card-v2-prog-hd">
          <span class="prog-card-v2-prog-lbl">${mod}</span>
          <span class="prog-card-v2-prog-pct">${pct}%</span>
        </div>
        <div class="prog-bar-wrap">
          <div class="prog-bar-fill ${barCls}" style="width:${pct}%"></div>
        </div>
      </div>

      <!-- Info grid -->
      <div class="prog-card-v2-info">
        <div class="prog-info-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          ${p.modules} Modul
        </div>
        <div class="prog-info-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${p.hours}
        </div>
        <div class="prog-info-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${date}
        </div>
        <div class="prog-info-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          ${isDone ? 'Lulus' : (pct > 0 ? 'Progress '+pct+'%' : 'Baru dimulai')}
        </div>
      </div>

      <!-- Footer -->
      <div class="prog-card-v2-footer">
        ${actionBtn}
        <a href="program-detail.html" class="btn-lanjut outline" title="Detail Program">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </a>
      </div>
    </div>
  </div>`;
}

/* ─────────────────────────────────────────
   List item builder
───────────────────────────────────────── */
function buildListItem(p) {
  const isDone = p.certificateIssued || p.finalPassed || p.status === 'done';
  const needsQuiz = p.progress >= 100 && !p.quizPassed;
  const needsFinal = p.progress >= 100 && p.quizPassed && !p.finalPassed;
  const isPre  = p.status === 'pre-test';
  const pct    = p.progress || 0;
  const barCls = isDone ? 'done' : (isPre ? 'pre' : '');
  const rowHref = isDone ? `certificate.html?code=${p.code}` : needsQuiz ? `quiz.html?code=${p.code}` : needsFinal ? `exam.html?code=${p.code}&type=final` : moduleHref(p);

  const statusBadge = isDone
    ? `<span class="badge badge-success">✓ Lulus</span>`
    : needsQuiz
      ? `<span class="badge badge-warning">Quiz</span>`
      : needsFinal
        ? `<span class="badge badge-warning">Final</span>`
    : isPre
      ? `<span class="badge badge-warning">Pre-Test</span>`
      : `<span class="badge badge-success">Berlangsung</span>`;

  let actionBtn;
  if (isDone)    actionBtn = `<a href="certificate.html?code=${p.code}" class="btn btn-success btn-sm">Sertifikat</a>`;
  else if (needsQuiz) actionBtn = `<a href="quiz.html?code=${p.code}" class="btn btn-outline btn-sm">Quiz</a>`;
  else if (needsFinal) actionBtn = `<a href="exam.html?code=${p.code}&type=final" class="btn btn-outline btn-sm">Final</a>`;
  else if (isPre) actionBtn = `<a href="exam.html?code=${p.code}&type=pretest" class="btn btn-outline btn-sm">Pre-Test</a>`;
  else           actionBtn = `<a href="${moduleHref(p)}" class="btn btn-primary btn-sm">Lanjutkan</a>`;

  return `
  <div class="prog-list-item" onclick="location.href='${rowHref}'">
    <div class="prog-list-icon">${p.icon || '📘'}</div>
    <div class="prog-list-main">
      <div class="prog-list-code">${p.code}</div>
      <div class="prog-list-title">${p.title}</div>
      <div class="prog-list-badges">
        ${CAT_BADGE[p.category] || ''}
        ${statusBadge}
      </div>
    </div>
    <div class="prog-list-bar">
      <div class="prog-list-bar-hd">
        <span class="prog-list-bar-lbl">${isDone ? 'Selesai' : 'Progress'}</span>
        <span class="prog-list-bar-pct">${pct}%</span>
      </div>
      <div class="prog-bar-wrap">
        <div class="prog-bar-fill ${barCls}" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="prog-list-action">${actionBtn}</div>
  </div>`;
}

/* ─────────────────────────────────────────
   Init
───────────────────────────────────────── */
render();
</script>
</body>
</html>
