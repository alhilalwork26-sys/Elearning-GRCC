<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi Saya — GRCC Academy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/d-sidebar.css">
  <style>
    body { background: var(--bg); font-family: var(--font-b); }

    /* ── Module content viewer ── */
    .mat-viewer-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 28px;
      height: 52px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 60px; z-index: 90;
      flex-shrink: 0;
    }
    .mat-viewer-back {
      display: flex; align-items: center; gap: 6px;
      font-size: .8125rem; font-weight: 600; color: var(--text-sm);
      text-decoration: none; padding: 6px 10px; border-radius: var(--r-md);
      border: 1px solid var(--border); background: var(--white);
      cursor: pointer; transition: all .15s;
    }
    .mat-viewer-back:hover { background: var(--bg); color: var(--navy); border-color: var(--navy); }
    .mat-viewer-breadcrumb {
      flex: 1; font-size: .8125rem; color: var(--text-xs);
      display: flex; align-items: center; gap: 6px;
    }
    .mat-viewer-breadcrumb strong { color: var(--navy); }
    .mat-viewer-progress-wrap { display: flex; align-items: center; gap: 8px; font-size: .8rem; color: var(--text-xs); }
    .mat-viewer-bar-track { width: 100px; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .mat-viewer-bar-fill { height: 100%; background: var(--teal); border-radius: 99px; }
    .mat-viewer-bar-pct { font-weight: 700; color: var(--teal); }

    .mat-viewer-body {
      max-width: 760px; width: 100%; margin: 0 auto;
      padding: 40px 28px 100px;
      animation: fadeInUp .3s ease;
    }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    .mat-viewer-kicker {
      font-size: .72rem; font-weight: 700; color: var(--teal);
      text-transform: uppercase; letter-spacing: .12em; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .mat-viewer-h1 {
      font-size: 1.75rem; font-weight: 900; color: var(--navy);
      line-height: 1.25; margin-bottom: 8px; font-family: var(--font-h);
    }
    .mat-viewer-meta {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      font-size: .78rem; color: var(--text-xs); margin-bottom: 32px;
      padding-bottom: 24px; border-bottom: 1px solid var(--border);
    }
    .mat-viewer-meta span { display: flex; align-items: center; gap: 5px; }
    .mat-viewer-p { font-size: .9375rem; color: var(--text-md); line-height: 1.85; margin-bottom: 18px; }
    .mat-viewer-h2 {
      font-size: 1.125rem; font-weight: 800; color: var(--navy);
      margin: 36px 0 14px; display: flex; align-items: center; gap: 8px;
    }
    .mat-viewer-h2::before {
      content: ''; width: 4px; height: 18px;
      background: var(--teal); border-radius: 2px; flex-shrink: 0;
    }
    .mat-viewer-h3 { font-size: 1rem; font-weight: 700; color: var(--navy); margin: 22px 0 10px; }
    .mat-viewer-callout {
      background: var(--teal-lt, rgba(20,184,166,.08));
      border-left: 4px solid var(--teal); border-radius: var(--r-lg);
      padding: 18px 20px; margin: 20px 0;
      font-size: .9rem; color: var(--text-md); line-height: 1.75;
    }
    .mat-viewer-callout strong { display: block; font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--teal-dk); margin-bottom: 6px; }
    .mat-viewer-list { padding-left: 22px; margin-bottom: 18px; }
    .mat-viewer-list li { font-size: .9375rem; color: var(--text-md); line-height: 1.75; margin-bottom: 8px; }
    .mat-viewer-footer {
      display: flex; gap: 12px; margin-top: 56px; padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .mat-viewer-footer .btn { flex: 1; justify-content: center; gap: 8px; padding: 12px 18px; font-size: .9rem; }

    /* Program tabs */
    .mat-prog-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 20px 28px 0;
    }
    .mat-prog-tab {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: .8125rem; font-weight: 600; color: var(--text-sm);
      cursor: pointer; transition: all .15s;
      text-decoration: none;
    }
    .mat-prog-tab:hover { border-color: var(--teal); color: var(--teal); }
    .mat-prog-tab.active {
      background: var(--navy); color: white; border-color: var(--navy);
    }
    .mat-prog-tab .tab-icon { font-size: .875rem; }

    /* Content area */
    .mat-content { padding: 24px 28px 60px; }

    /* Program header card */
    .mat-prog-header {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 20px;
    }
    .mat-prog-icon {
      width: 56px; height: 56px;
      background: rgba(20,184,166,.1);
      border-radius: var(--r-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; flex-shrink: 0;
    }
    .mat-prog-info { flex: 1; min-width: 0; }
    .mat-prog-code { font-size: .7rem; font-weight: 700; letter-spacing: .1em; color: var(--text-xs); text-transform: uppercase; margin-bottom: 4px; }
    .mat-prog-title { font-size: 1.125rem; font-weight: 800; color: var(--navy); margin-bottom: 8px; font-family: var(--font-h); }
    .mat-prog-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .mat-prog-stats { display: flex; gap: 20px; flex-shrink: 0; text-align: center; }
    .mat-stat { }
    .mat-stat-val { font-size: 1.25rem; font-weight: 900; color: var(--navy); font-family: var(--font-h); }
    .mat-stat-lbl { font-size: .7rem; color: var(--text-xs); margin-top: 2px; }

    /* Progress bar in header */
    .mat-prog-progress { margin-top: 14px; }
    .mat-prog-progress-hd { display: flex; justify-content: space-between; font-size: .78rem; margin-bottom: 6px; }
    .mat-prog-progress-lbl { color: var(--text-xs); }
    .mat-prog-progress-pct { font-weight: 700; color: var(--teal); }
    .mat-prog-bar-wrap { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .mat-prog-bar { height: 100%; border-radius: 99px; background: var(--teal); transition: width .6s ease; }

    /* Module list */
    .mat-module-list { display: flex; flex-direction: column; gap: 12px; }
    .mat-module-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px;
      text-decoration: none;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .mat-module-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--border);
      transition: background .2s;
    }
    .mat-module-card.mod-done::before { background: var(--success); }
    .mat-module-card.mod-active::before { background: var(--teal); }
    .mat-module-card.mod-locked::before { background: var(--border); }
    .mat-module-card:hover:not(.mod-locked) { box-shadow: 0 4px 20px rgba(0,0,0,.09); transform: translateX(2px); border-color: rgba(20,184,166,.35); }
    .mat-module-card.mod-locked { opacity: .55; cursor: not-allowed; pointer-events: none; }

    .mat-mod-num {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .875rem; font-weight: 800; color: var(--text-sm);
      flex-shrink: 0; background: var(--bg);
      transition: all .2s;
    }
    .mat-module-card.mod-done   .mat-mod-num { background: var(--success); border-color: var(--success); color: white; }
    .mat-module-card.mod-active .mat-mod-num { background: var(--teal);    border-color: var(--teal);    color: white; box-shadow: 0 0 0 4px rgba(20,184,166,.18); }

    .mat-mod-info { flex: 1; min-width: 0; }
    .mat-mod-label { font-size: .68rem; font-weight: 700; color: var(--text-xs); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
    .mat-mod-title { font-size: .9375rem; font-weight: 700; color: var(--navy); line-height: 1.4; }
    .mat-mod-sub { font-size: .78rem; color: var(--text-xs); margin-top: 4px; display: flex; align-items: center; gap: 10px; }

    .mat-mod-badge {
      font-size: .7rem; font-weight: 700; padding: 3px 10px;
      border-radius: 99px; flex-shrink: 0;
    }
    .mat-mod-badge.done   { background: rgba(34,197,94,.12);  color: #16a34a; }
    .mat-mod-badge.active { background: rgba(20,184,166,.12);  color: var(--teal-dk); }
    .mat-mod-badge.locked { background: var(--bg); color: var(--text-xs); }

    .mat-mod-arrow { color: var(--text-xs); flex-shrink: 0; transition: transform .2s, color .2s; }
    .mat-module-card:hover:not(.mod-locked) .mat-mod-arrow { transform: translateX(4px); color: var(--teal); }

    /* Empty state */
    .mat-empty {
      text-align: center; padding: 80px 20px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
    }
    .mat-empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .mat-empty-title { font-size: 1.125rem; font-weight: 800; color: var(--navy); margin-bottom: 8px; font-family: var(--font-h); }
    .mat-empty-desc { color: var(--text-sm); font-size: .9rem; margin-bottom: 24px; }
  </style>
</head>

<script>
const { getEnrolled, getProgram, getProgramModules } = window.GRCCAcademy;

/* ── State ── */
let activeCode = null;

function getModDurMins(totalHours, totalMods) {
  const h = parseInt(totalHours) || 0;
  if (!h || !totalMods) return null;
  return Math.round((h * 60) / totalMods);
}

function renderPage() {
  const enrolled = getEnrolled();
  const tabs = document.getElementById('matProgTabs');
  const content = document.getElementById('matContent');

  if (enrolled.length === 0) {
    tabs.innerHTML = '';
    content.innerHTML = `
      <div class="mat-empty">
        <div class="mat-empty-icon">📚</div>
        <div class="mat-empty-title">Belum Ada Program yang Diikuti</div>
        <div class="mat-empty-desc">Enroll program terlebih dahulu untuk mengakses materi pembelajaran.</div>
        <a href="enroll.html" class="btn btn-primary">+ Enroll Program Sekarang</a>
      </div>`;
    return;
  }

  // Set active code — read from hash (#prog=CODE)
  const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
  const urlCode = hashParams.get('prog');
  if (!activeCode || !enrolled.find(e => e.code === activeCode)) {
    activeCode = urlCode && enrolled.find(e => e.code === urlCode) ? urlCode : enrolled[0].code;
  }

  // Render tabs
  tabs.innerHTML = enrolled.map(e => `
    <a href="#prog=${e.code}" class="mat-prog-tab ${e.code === activeCode ? 'active' : ''}" onclick="switchProg(event,'${e.code}')">
      <span class="tab-icon">${e.icon || '📘'}</span>
      <span>${e.code}</span>
    </a>
  `).join('');

  // Get active program
  const prog = enrolled.find(e => e.code === activeCode);
  const info = getProgram(activeCode) || {};
  const mods = getProgramModules(activeCode);
  const currentMod = prog.currentModule || 1;
  const progress = prog.progress || 0;
  const doneCount = Math.floor((progress / 100) * mods.length);
  const rawHours = parseInt(prog.hours) || parseInt(info.hours) || 18;
  const hoursPerMod = getModDurMins(rawHours, mods.length);
  const durLabel = hoursPerMod ? `${hoursPerMod} menit` : '—';

  // Badge helper
  const badge = (txt, cls) => `<span class="badge badge-${cls}" style="font-size:.72rem;">${txt}</span>`;

  content.innerHTML = `
    <div class="mat-prog-header">
      <div class="mat-prog-icon">${prog.icon || info.icon || '📘'}</div>
      <div class="mat-prog-info">
        <div class="mat-prog-code">${prog.code}</div>
        <div class="mat-prog-title">${prog.title || info.title}</div>
        <div class="mat-prog-badges">
          ${badge(prog.category || info.category || 'GRC', 'teal')}
          ${badge(prog.level || info.level || 'Intermediate', 'navy')}
        </div>
        <div class="mat-prog-progress">
          <div class="mat-prog-progress-hd">
            <span class="mat-prog-progress-lbl">Progress keseluruhan</span>
            <span class="mat-prog-progress-pct">${progress}%</span>
          </div>
          <div class="mat-prog-bar-wrap">
            <div class="mat-prog-bar" style="width:${progress}%"></div>
          </div>
        </div>
      </div>
      <div class="mat-prog-stats">
        <div class="mat-stat">
          <div class="mat-stat-val">${mods.length}</div>
          <div class="mat-stat-lbl">Total Modul</div>
        </div>
        <div class="mat-stat">
          <div class="mat-stat-val">${doneCount}</div>
          <div class="mat-stat-lbl">Selesai</div>
        </div>
        <div class="mat-stat">
          <div class="mat-stat-val">${rawHours}</div>
          <div class="mat-stat-lbl">Jam Total</div>
        </div>
      </div>
    </div>

    <div class="mat-module-list">
      ${mods.map((title, i) => {
        const n = i + 1;
        const isDone   = n < currentMod || (progress >= 100);
        const isActive = n === currentMod;
        const isLocked = n > currentMod;
        const cls = isDone ? 'mod-done' : isActive ? 'mod-active' : 'mod-locked';
        const badgeLabel = isDone ? 'Selesai' : isActive ? 'Sedang Dipelajari' : 'Terkunci';
        const badgeCls   = isDone ? 'done'    : isActive ? 'active'            : 'locked';
        const onclick = isLocked ? '' : `onclick="openModule('${activeCode}',${n});return false;"`;
        return `
        <a href="#prog=${activeCode}&mod=${n}" class="mat-module-card ${cls}" ${onclick}>
          <div class="mat-mod-num">${isDone ? '✓' : n}</div>
          <div class="mat-mod-info">
            <div class="mat-mod-label">Modul ${n} · ${durLabel}</div>
            <div class="mat-mod-title">${title}</div>
            <div class="mat-mod-sub">
              <span>${rawHours} jam total</span>·<span>${mods.length} modul</span>
            </div>
          </div>
          <span class="mat-mod-badge ${badgeCls}">${badgeLabel}</span>
          <svg class="mat-mod-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>`;
      }).join('')}
    </div>
  `;
}

function switchProg(e, code) {
  e.preventDefault();
  activeCode = code;
  history.replaceState(null, '', '#prog=' + code);
  renderPage();
}

/* ── Module content viewer ── */
function openModule(code, n) {
  activeCode = code;
  history.pushState(null, '', `#prog=${code}&mod=${n}`);
  renderModuleView(code, n);
}

function closeModule() {
  history.pushState(null, '', '#prog=' + activeCode);
  renderPage();
}

function renderModuleView(code, n) {
  const enrolled = getEnrolled();
  const prog = enrolled.find(e => e.code === code);
  const info = getProgram(code) || {};
  const mods = getProgramModules(code);
  const total = mods.length;
  const idx = Math.max(0, Math.min(n - 1, total - 1));
  const modTitle = mods[idx] || `Modul ${n}`;
  const rawHours = parseInt(prog?.hours) || parseInt(info.hours) || 18;
  const hoursPerMod = getModDurMins(rawHours, total);
  const progress = prog?.progress || 0;
  const modPct = Math.min(100, Math.round((n / total) * 100));

  // Hide tabs while viewing
  document.getElementById('matProgTabs').style.display = 'none';

  // Update topbar title
  const topbarTitle = document.querySelector('.d-page-topbar-title');
  if (topbarTitle) topbarTitle.textContent = modTitle;

  document.getElementById('matContent').innerHTML = `
    <!-- Sticky bar -->
    <div class="mat-viewer-bar">
      <button class="mat-viewer-back" onclick="closeModule()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Kembali
      </button>
      <div class="mat-viewer-breadcrumb">
        <span>${code}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <strong>Modul ${n}: ${modTitle}</strong>
      </div>
      <div class="mat-viewer-progress-wrap">
        <span>Modul ${n}/${total}</span>
        <div class="mat-viewer-bar-track"><div class="mat-viewer-bar-fill" style="width:${modPct}%"></div></div>
        <span class="mat-viewer-bar-pct">${modPct}%</span>
      </div>
    </div>

    <!-- Article body -->
    <div class="mat-viewer-body">
      <div class="mat-viewer-kicker">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Estimasi Baca: ${hoursPerMod || 45} Menit &nbsp;·&nbsp;
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
        Modul ${n} dari ${total}
      </div>
      <h1 class="mat-viewer-h1">${modTitle}</h1>
      <div class="mat-viewer-meta">
        <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Diperbarui: Mei 2026</span>
        <span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> ${info.title || prog?.title || code}</span>
      </div>

      <div class="mat-viewer-callout">
        <strong>Apa yang akan Anda pelajari:</strong>
        Modul ini membahas konsep dan implementasi ${modTitle.toLowerCase()} dalam konteks GRC (Governance, Risk, and Compliance) sesuai standar internasional yang berlaku.
      </div>

      <h2 class="mat-viewer-h2">1. Pendahuluan</h2>
      <p class="mat-viewer-p">
        ${modTitle} merupakan salah satu aspek fundamental dalam kerangka GRC modern. Pemahaman yang mendalam terhadap topik ini akan membantu praktisi dalam merancang dan mengimplementasikan sistem tata kelola yang efektif di organisasi mereka.
      </p>
      <p class="mat-viewer-p">
        Berdasarkan standar internasional seperti ISO 31000:2018, COSO ERM, dan regulasi OJK, setiap organisasi diwajibkan untuk memiliki mekanisme yang terstruktur dalam mengelola aspek ini secara berkelanjutan.
      </p>

      <h2 class="mat-viewer-h2">2. Konsep Utama</h2>
      <h3 class="mat-viewer-h3">2.1 Definisi dan Ruang Lingkup</h3>
      <p class="mat-viewer-p">
        Dalam konteks profesional GRC Indonesia, ${modTitle.toLowerCase()} didefinisikan sebagai proses sistematis yang mencakup identifikasi, analisis, evaluasi, dan penanganan terhadap faktor-faktor yang berpotensi mempengaruhi pencapaian tujuan organisasi.
      </p>
      <ul class="mat-viewer-list">
        <li>Identifikasi komprehensif terhadap seluruh aspek yang relevan</li>
        <li>Analisis mendalam menggunakan metodologi yang terstandarisasi</li>
        <li>Evaluasi berbasis data dan bukti yang dapat diverifikasi</li>
        <li>Penanganan proaktif sesuai risk appetite organisasi</li>
        <li>Pemantauan dan review berkala terhadap efektivitas implementasi</li>
      </ul>

      <h3 class="mat-viewer-h3">2.2 Kerangka Regulasi</h3>
      <p class="mat-viewer-p">
        Regulasi di Indonesia yang mengatur aspek ini antara lain POJK No. 18/POJK.03/2016 tentang Penerapan Manajemen Risiko bagi Bank Umum, serta berbagai ketentuan Bank Indonesia dan OJK yang terus berkembang mengikuti perkembangan industri keuangan global.
      </p>

      <div class="mat-viewer-callout">
        <strong>Poin Penting:</strong>
        Implementasi yang efektif dari ${modTitle.toLowerCase()} memerlukan komitmen dari seluruh level organisasi, mulai dari Dewan Komisaris hingga staf operasional. Pendekatan top-down dan bottom-up harus dijalankan secara bersamaan.
      </div>

      <h2 class="mat-viewer-h2">3. Implementasi Praktis</h2>
      <p class="mat-viewer-p">
        Dalam praktiknya, implementasi ${modTitle.toLowerCase()} di organisasi keuangan Indonesia mengikuti siklus PDCA (Plan-Do-Check-Act) yang terintegrasi dengan sistem manajemen yang sudah ada. Setiap tahapan harus didokumentasikan dengan baik sebagai bukti kepatuhan kepada regulator.
      </p>
      <ul class="mat-viewer-list">
        <li><strong>Plan:</strong> Merancang kebijakan, prosedur, dan metodologi yang sesuai</li>
        <li><strong>Do:</strong> Mengimplementasikan rencana yang telah disusun secara sistematis</li>
        <li><strong>Check:</strong> Memantau dan mengukur efektivitas implementasi secara berkala</li>
        <li><strong>Act:</strong> Melakukan perbaikan berkelanjutan berdasarkan hasil evaluasi</li>
      </ul>

      <!-- Navigation buttons -->
      <div class="mat-viewer-footer">
        ${n > 1
          ? `<button onclick="openModule('${code}',${n-1})" class="btn btn-outline">
               <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
               Modul ${n-1}: ${mods[n-2] || ''}
             </button>`
          : `<button onclick="closeModule()" class="btn btn-outline">
               <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
               Kembali ke Daftar
             </button>`
        }
        ${n < total
          ? `<button onclick="openModule('${code}',${n+1})" class="btn btn-primary">
               Modul ${n+1}: ${mods[n] || ''}
               <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
             </button>`
          : `<button onclick="closeModule()" class="btn btn-primary">
               <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
               Selesai — Kembali ke Daftar
             </button>`
        }
      </div>
    </div>
  `;
}

window.addEventListener('hashchange', () => {
  const hp = new URLSearchParams(location.hash.replace(/^#/, ''));
  const code = hp.get('prog');
  const mod  = parseInt(hp.get('mod') || '0');
  if (code && mod) {
    activeCode = code;
    renderModuleView(code, mod);
  } else {
    activeCode = code || null;
    document.getElementById('matProgTabs').style.display = '';
    const topbarTitle = document.querySelector('.d-page-topbar-title');
    if (topbarTitle) topbarTitle.textContent = 'Materi Saya';
    renderPage();
  }
});

/* ── Sidebar JS ── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

/* ── Auth ── */
(function initAuth() {
  const name  = localStorage.getItem('grcc_name')  || 'Ahmad Fauzi, S.E.';
  const role  = localStorage.getItem('grcc_role')  || 'peserta';
  const labels = { peserta:'Peserta Aktif', admin:'Administrator', instruktur:'Instruktur' };
  const dashMap = { peserta:'dashboard.html', admin:'admin.html', instruktur:'instruktur.html' };
  const initials = name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
  document.getElementById('dSidebarName').textContent = name;
  document.getElementById('dSidebarRole').textContent = labels[role] || 'Peserta Aktif';
  document.getElementById('dSidebarAvatar').textContent = initials || 'AF';
  document.getElementById('topbarAvatar').textContent = initials;
  document.getElementById('topbarName').textContent = name.split(' ')[0];
  const dashLink = document.getElementById('dashLink');
  if (dashLink) dashLink.href = dashMap[role] || 'dashboard.html';
  document.getElementById('logoutLink').addEventListener('click', e => {
    e.preventDefault();
    localStorage.removeItem('grcc_role');
    localStorage.removeItem('grcc_name');
    localStorage.removeItem('grcc_email');
    localStorage.removeItem('grcc_user_key');
    window.location.href = 'login.html';
  });
})();

renderPage();
</script>
